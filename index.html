<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Gradient Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Unbounded:wght@700;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'MC';
  src: url('https://fonts.cdnfonts.com/s/19907/Minecraftia-Regular.woff') format('woff');
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--s1:#0d0f1c;--s2:#12152a;--s3:#181c33;
  --b1:rgba(255,255,255,.055);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.18);
  --txt:#dde3f0;--muted:#4a5270;--dim:#2a304d;
  --acc:#7c6fff;--acc2:#b8b0ff;
  --ok:#2dd4a0;--warn:#ff5252;
}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* noise */
body::after{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.022;pointer-events:none;z-index:9999}

/* blobs */
.blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;animation:drift 20s ease-in-out infinite alternate}
.ba{width:700px;height:700px;top:-200px;left:-150px;background:radial-gradient(circle,rgba(100,80,255,.13),transparent 70%);animation-duration:22s}
.bb{width:500px;height:500px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(180,100,255,.10),transparent 70%);animation-duration:17s;animation-delay:-9s}
.bc{width:380px;height:380px;top:45%;left:42%;background:radial-gradient(circle,rgba(60,200,255,.07),transparent 70%);animation-duration:26s;animation-delay:-5s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.08)}}

/* shell */
.shell{position:relative;z-index:1;max-width:1260px;margin:0 auto;padding:0 24px 80px}

/* header */
header{display:flex;align-items:center;justify-content:space-between;padding:28px 0;border-bottom:1px solid var(--b1);margin-bottom:24px;flex-wrap:wrap;gap:14px}
.mark{display:flex;flex-direction:column;gap:4px}
.mark-title{font-family:'Unbounded',sans-serif;font-size:1.3rem;font-weight:900;letter-spacing:-.03em;line-height:1;background:linear-gradient(110deg,#fff 0%,#b8b0ff 55%,#7c6fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mark-sub{font-size:9px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}

.ctr{font-family:'DM Mono',monospace;font-size:1.55rem;font-weight:500;padding:10px 22px;background:var(--s1);border:1px solid var(--b2);border-radius:14px;transition:all .25s;min-width:118px;text-align:center;line-height:1;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.ctr span{font-size:.52em;color:var(--muted)}
.ctr.over{background:rgba(255,82,82,.12);border-color:var(--warn);color:var(--warn);animation:throb .9s infinite;box-shadow:0 0 24px rgba(255,82,82,.2)}
.ctr.maxed{border-color:var(--acc);color:var(--acc2);box-shadow:0 0 20px rgba(124,111,255,.2)}
@keyframes throb{0%,100%{opacity:1}50%{opacity:.45}}

/* layout */
.layout{display:grid;grid-template-columns:318px 1fr;gap:20px;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr}}
.left,.right{display:flex;flex-direction:column;gap:16px}

/* card */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:20px;transition:all .3s ease;animation:up .4s ease both;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.card:hover{border-color:var(--b3);box-shadow:0 12px 32px rgba(0,0,0,.35)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.left .card:nth-child(1){animation-delay:.05s}.left .card:nth-child(2){animation-delay:.10s}.left .card:nth-child(3){animation-delay:.16s}
.right .card:nth-child(1){animation-delay:.08s}.right .card:nth-child(2){animation-delay:.14s}.right .card:nth-child(3){animation-delay:.20s}

.ctitle{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.22em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.ctitle .badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0;color:var(--dim)}

/* stops */
.stops{max-height:255px;overflow-y:auto;padding-right:4px;margin-bottom:12px}
.srow{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:8px 10px;margin-bottom:6px;transition:all .2s;cursor:grab}
.srow:hover{border-color:var(--b3);background:var(--s3)}
.srow.drag{opacity:.35;cursor:grabbing;transform:scale(0.98)}
.sw{width:32px;height:32px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.10);flex-shrink:0;position:relative;cursor:pointer;box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
.sw input[type=color]{position:absolute;inset:-30%;width:160%;height:160%;border:none;background:transparent;appearance:none;cursor:pointer}
.sw input[type=color]::-webkit-color-swatch{border:none;border-radius:0}
.hx{flex:1;background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:12px;color:var(--txt);min-width:0;letter-spacing:.06em}
.sdel{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:6px;border-radius:8px;line-height:1;transition:all .2s}
.srow:hover .sdel{opacity:1}
.sdel:hover{color:var(--warn);background:rgba(255,82,82,.1)}

.gbar{height:6px;border-radius:6px;margin-bottom:14px;transition:background .3s;box-shadow:inset 0 1px 3px rgba(0,0,0,.5)}

/* btn */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-family:'Manrope',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(124,111,255,.3)}
.btn:hover{background:var(--acc2);color:#1a1040;transform:translateY(-2px);box-shadow:0 6px 16px rgba(184,176,255,.4)}
.btn:active{transform:scale(.97)}

/* presets */
.pwrap{max-height:360px;overflow-y:auto;padding-right:4px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.preset{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:10px 12px;font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:var(--txt);cursor:pointer;display:flex;flex-direction:column;gap:8px;text-align:left;transition:all .2s;position:relative;overflow:hidden}
.preset::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);pointer-events:none}
.preset:hover{border-color:var(--b3);background:var(--s3);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.preset:active{transform:scale(.97)}
.pbar{display:flex;height:4px;border-radius:4px;overflow:hidden;gap:1px;box-shadow:inset 0 1px 2px rgba(0,0,0,.3)}
.pbar span{flex:1}

/* settings */
.flabel{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);margin-bottom:8px;display:block}
.field{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--txt);outline:none;transition:all .2s;box-shadow:inset 0 2px 4px rgba(0,0,0,.2)}
.field:focus{border-color:var(--acc);box-shadow:inset 0 2px 4px rgba(0,0,0,.2), 0 0 0 3px rgba(124,111,255,.15)}
.togrow{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toglabel{font-size:12px;font-weight:600;color:var(--muted)}
.toglabel code{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);background:var(--s3);padding:2px 6px;border-radius:6px}
.tog{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
.tog input{display:none}
.ttrack{position:absolute;inset:0;background:var(--s3);border:1px solid var(--b2);border-radius:12px;transition:.2s}
.tog input:checked~.ttrack{background:var(--acc);border-color:var(--acc)}
.tthumb{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.3s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,.4)}
.tog input:checked~.tthumb{left:22px}

/* text input */
.tcard{padding:32px 28px}
.mtext{width:100%;background:transparent;border:none;outline:none;resize:none;font-family:'Unbounded',sans-serif;font-size:1.6rem;font-weight:700;color:var(--txt);text-align:center;line-height:1.3;transition:font-size .2s}
.mtext::placeholder{color:rgba(255,255,255,.12)}

/* preview */
.pcard{padding:24px}
.mcscreen{background:#090909;border:1px solid #1c1c1c;border-bottom:3px solid #000;border-right:3px solid #000;border-radius:16px;min-height:160px;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;margin-bottom:20px}
.mcscreen::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.007) 2px,rgba(255,255,255,.007) 4px);pointer-events:none}
.mcscreen::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 80px rgba(0,0,0,.92);pointer-events:none;border-radius:16px}
#preview{font-family:'MC','Courier New',monospace;text-shadow:2px 2px 0 rgba(0,0,0,.95),3px 3px 0 rgba(0,0,0,.6);white-space:pre-wrap;word-break:break-all;line-height:1.5;text-align:center;width:100%;transition:font-size .2s;position:relative;z-index:1}

.outrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.outlabel{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.2em;color:var(--muted)}
.pill{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;padding:4px 12px;border-radius:20px;background:rgba(45,212,160,.1);color:var(--ok);border:1px solid rgba(45,212,160,.2);transition:all .3s}
.pill.warn{background:rgba(255,82,82,.1);color:var(--warn);border-color:rgba(255,82,82,.3);box-shadow:0 0 10px rgba(255,82,82,.15)}

#output{width:100%;height:100px;background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:14px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--acc2);resize:none;outline:none;transition:all .2s;box-shadow:inset 0 2px 6px rgba(0,0,0,.2)}
#output:focus{border-color:var(--acc)}
#output.error{border-color:var(--warn);color:var(--warn);background:rgba(255,82,82,.05);box-shadow:inset 0 0 0 1px rgba(255,82,82,.2)}

.copybtn{background:var(--acc);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-family:'Manrope',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(124,111,255,.3)}
.copybtn:hover:not(.disabled){background:var(--acc2);color:#1a1040;transform:translateY(-2px);box-shadow:0 6px 16px rgba(184,176,255,.4)}
.copybtn:active:not(.disabled){transform:scale(.96)}
.copybtn.disabled{background:var(--s2);color:var(--warn);border:1px solid var(--warn);cursor:not-allowed;box-shadow:none;opacity:0.8}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}
</style>
</head>
<body>

<div class="blob ba"></div>
<div class="blob bb"></div>
<div class="blob bc"></div>

<div class="shell">
  <header>
    <div class="mark">
      <div class="mark-title">Gradient Studio</div>
      <div class="mark-sub">Minecraft Chat Optimizer</div>
    </div>
    <div id="ctr" class="ctr">0<span>/256</span></div>
  </header>

  <div class="layout">
    <div class="left">

      <div class="card">
        <div class="ctitle">Точки цвета <span id="dc" class="badge">0 / 12</span></div>
        <div id="stops" class="stops"></div>
        <div id="gbar" class="gbar"></div>
        <button class="btn" onclick="addStop()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Добавить цвет
        </button>
      </div>

      <div class="card">
        <div class="ctitle">Пресеты</div>
        <div class="pwrap"><div class="pgrid" id="pgrid"></div></div>
      </div>

      <div class="card">
        <div class="ctitle">Настройки</div>
        
        <div style="margin-bottom:16px; display:flex; gap:12px;">
          <div style="flex:1">
            <label class="flabel">Команда / Префикс</label>
            <input type="text" id="prefix" value="/bc " class="field" oninput="update()">
          </div>
          <div style="width:100px;">
            <label class="flabel">Лимит симв.</label>
            <input type="number" id="limit" value="256" class="field" min="10" max="9999" oninput="update()" style="text-align:center; font-weight:700;">
          </div>
        </div>
        
        <div class="togrow">
          <span class="toglabel">Жирный <code>&amp;l</code></span>
          <label class="tog">
            <input type="checkbox" id="bold" checked onchange="update()">
            <div class="ttrack"></div>
            <div class="tthumb"></div>
          </label>
        </div>
      </div>

    </div>

    <div class="right">

      <div class="card">
        <div class="ctitle">Копирование (Клик = Буфер обмена)</div>
        <div class="pgrid" id="tpgrid"></div>
      </div>

      <div class="card tcard">
        <div class="ctitle" style="margin-bottom:16px">Ваше сообщение</div>
        <textarea id="mainText" class="mtext" rows="2" oninput="update()" placeholder="Напишите текст...">Текст</textarea>
      </div>

      <div class="card pcard">
        <div class="ctitle" style="margin-bottom:16px">Превью в игровом чате</div>
        <div class="mcscreen"><div id="preview"></div></div>
        <div class="outrow">
          <span class="outlabel">Код для вставки</span>
          <span id="pill" class="pill">Готово</span>
        </div>
        <textarea id="output" readonly></textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:14px">
          <button id="copyBtn" class="copybtn" onclick="doCopy(event)">Копировать код</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
let colors=['#bc00ff','#ff00ff','#ff8800'];

const PRESETS=[
  {n:'🌈 Радуга',    c:['#ff0000','#ff8c00','#ffff00','#00e676','#00b0ff','#7c4dff','#ff00ff']},
  {n:'🌊 Неон',      c:['#00ff00','#00ffff','#ff00ff']},
  {n:'📼 Ретровейв', c:['#f3e600','#ff00a0','#4a00e0']},
  {n:'🌲 Лес',       c:['#1a3300','#336600','#66bb00','#99dd00','#ccff44']},
  {n:'🔮 Магия',     c:['#4a00e0','#8e2de2','#f000ff','#ff007f']},
  {n:'🌸 Пастель',   c:['#ffb3ba','#ffdfba','#ffffba','#baffc9','#bae1ff']},
  {n:'🩸 Кровавый',  c:['#3a0000','#8b0000','#ff0000','#4a0000']},
  {n:'🧪 Токсик',    c:['#bfff00','#00ff00','#006600']},
  {n:'🌌 Космос',    c:['#000000','#0f0f3d','#290066','#6600cc']},
  {n:'🍬 Вата',      c:['#ffbcd9','#fbe5ff','#d1e8ff']},
  {n:'🔥 Огонь',     c:['#1a0000','#ff2200','#ff7700','#ffcc00','#ffffff']},
  {n:'💎 Алмаз',     c:['#fff','#a8edff','#00d4ff','#007acc','#00d4ff','#a8edff','#fff']},
  {n:'⚡ Гроза',     c:['#0a0a1a','#1a1aff','#8888ff','#fff9aa','#ffee00']},
  {n:'🌊 Океан',     c:['#001233','#023e8a','#0077b6','#00b4d8','#90e0ef','#caf0f8']},
  {n:'🌅 Закат',     c:['#0d0630','#4776e6','#9b54e9','#f83600','#f9c423']},
  {n:'🌃 Киберпанк', c:['#ff00cc','#7700ff','#00ffe1','#ff00cc']},
  {n:'🚨 Тревога',   c:['#000','#3d0000','#cc0000','#ff4444','#cc0000','#3d0000','#000']},
  {n:'💚 Matrix',    c:['#000','#003300','#00ff00','#88ff88','#00ff00','#003300']},
  {n:'☕ Espresso',  c:['#1a0800','#4a2c00','#8b5e3c','#c4a882','#e8d5b7']},
  {n:'🎃 Хэллоуин', c:['#0d0011','#4a0080','#aa3300','#ff6b00','#ffcc00']},
  {n:'🌙 Ночь',      c:['#000010','#10003d','#3300aa','#6600ff','#aa66ff','#ddbcff']},
  {n:'🎨 Художник',  c:['#fc5c7d','#6a82fb','#43e97b','#fa8231','#fc5c7d']},
  {n:'🟡 Золото',    c:['#3d2a00','#996600','#ffcc00','#ffe066','#ffcc00','#996600']},
  {n:'🩵 Лёд',       c:['#cceeff','#99ddff','#66ccff','#33aaee','#0077cc']}
];

const TEXT_PRESETS=[
  {n:'👑 Князь (Я)', t:'!&e &d &e &d &e &d &e &d &e &4 &4 &4 &f &f &f &f &f &f &f &b &f &b &f &b &f &b &f &b &c &e &f &e &f &e &f &c &e &b &d &b &a &d &3&6&f&#fc97fc[&#a80000&lКнязь &eweeloser &7> &eЯ&#fc97fc] qq'},
  {n:'💸 Перевод', t:'!&e &d &e &d &e &d &e &d &e &4 &4 &4 &f &f &f &f &f &f &f &b &f &b &f &b &f &b &f &b &c &e &f &e &f &e &f &e &f &c &f &e &b &a &d &f&4 &f &3&6&f&a[$] &fОт игрока &ename &fполучено &a+$1.000.000'},
  {n:'⚡ Запрос ТП', t:'!&e &d &e &d &e &d &e &d &e &4 &4 &4 &f &f &f &f &f &f &f &b &f &b &f &b &f &b &f &b &c &e &f &e &f &e &f &e &f &c &e &b &d &b &a &f &d &c &e &d&6 [&] &fВы отправили запaрос на телепортацию к &ename&f. &e &d &e &d &e &d &e &4 &4 &4 &b &4[Отменить телепорт]'},
  {n:'📶 Выс. Пинг', t:'!&0acacacacacacacacacacacacacacacacaaccacacacacccacacaca&aВаш пинг: &e2149. &e&d &e &d &e &d &e &d &e &4 &4 &4 &f &f &f &f &f &f &f &b &f &b &f &b &f &b &f &b &c &e &f &e &f &e &f &e &f &c &b &d &e &b &d &b &a &d &4 &6 &3 &4&d &b &7Отключение от сервера...'},
  {n:'💤 AFK', t:'!&0 &e &d &e &d &e &d &e &d &e &4 &4 &4 &f &f &f &f &f &f &f &b &f &b &f &b &f &b &f &b &c &e &f &e &f &e &f &e &f &c &e &b &d &b &a &d &4 &6 &3 &4&d &7Вы отошли.'},
  {n:'🛒 Фейк Покупка', t:'!&e &d &e &d &e &d &e &d &e &4 &4 &4 &f &f &f &f &f &f &f &b &f &b &f &b &f &b &f &b &c &e &f &e &f &e &f &e &f &c &e &b &d &b &a &f &d &d &d &f&4 &f&6 &3&#fc6500[&]&f У Вас купили &#fc6500Незеритовый Меч &fза &e$10 &fна &e/ah'}
];

function buildPresets(){
  const g=document.getElementById('pgrid');
  PRESETS.forEach(p=>{
    const b=document.createElement('button');
    b.className='preset';
    const bar=p.c.map(c=>`<span style="background:${c}"></span>`).join('');
    b.innerHTML=`<span>${p.n}</span><div class="pbar">${bar}</div>`;
    b.onclick=()=>setColors(p.c);
    g.appendChild(b);
  });
}

function buildTextPresets(){
  const g=document.getElementById('tpgrid');
  g.innerHTML = '';
  TEXT_PRESETS.forEach(p=>{
    const b=document.createElement('button');
    b.className='preset';
    b.style.alignItems='center';
    b.style.justifyContent='center';
    b.style.padding='12px 10px';
    b.style.textAlign='center';
    b.innerHTML=`<span>${p.n}</span>`;
    b.onclick=(e)=>copyToClipboard(p.t, e.currentTarget);
    g.appendChild(b);
  });
}

function copyToClipboard(str, btn) {
  const el = document.createElement('textarea');
  el.value = str;
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);

  const old = btn.innerHTML;
  btn.innerHTML = '<span>✓ Скопировано!</span>';
  btn.style.borderColor = 'var(--ok)';
  btn.style.background = 'rgba(45,212,160,.1)';
  setTimeout(() => {
    btn.innerHTML = old;
    btn.style.borderColor = '';
    btn.style.background = '';
  }, 1200);
}

function renderStops(){
  const el=document.getElementById('stops');
  el.innerHTML='';
  colors.forEach((c,i)=>{
    const row=document.createElement('div');
    row.className='srow';row.draggable=true;row.dataset.i=i;
    row.innerHTML=`
      <div class="sw" style="background:${c}">
        <input type="color" value="${c}" oninput="colors[${i}]=this.value;document.getElementById('h${i}').value=this.value.toUpperCase();updGbar();update()">
      </div>
      <input id="h${i}" class="hx" value="${c.toUpperCase()}" oninput="onHex(${i},this.value)" maxlength="7" spellcheck="false">
      <button class="sdel" onclick="remStop(${i})">✕</button>`;
    row.addEventListener('dragstart',e=>{e.dataTransfer.setData('i',i);row.classList.add('drag')});
    row.addEventListener('dragend',()=>row.classList.remove('drag'));
    row.addEventListener('dragover',e=>e.preventDefault());
    row.addEventListener('drop',e=>{
      e.preventDefault();
      const f=+e.dataTransfer.getData('i');
      if(f===i)return;
      const t=colors[f];colors[f]=colors[i];colors[i]=t;
      renderStops();update();
    });
    el.appendChild(row);
  });
  document.getElementById('dc').textContent=`${colors.length} / 12`;
  updGbar();
}

function onHex(i,v){if(/^#[0-9a-fA-F]{6}$/.test(v)){colors[i]=v;renderStops();update()}}
function updGbar(){
  const b=document.getElementById('gbar');
  b.style.background=colors.length<2?colors[0]:`linear-gradient(to right,${colors.join(',')})`;
}
function addStop(){if(colors.length<12){colors.push('#ffffff');renderStops();update()}}
function remStop(i){if(colors.length>2){colors.splice(i,1);renderStops();update()}}
function setColors(nc){colors=[...nc];renderStops();update()}

const h2r=h=>({r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)});
const r2h=(r,g,b)=>'#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');
function lerp(list,f){
  if(f<=0)return list[0];if(f>=1)return list[list.length-1];
  const seg=1/(list.length-1);
  const i=Math.min(Math.floor(f/seg),list.length-2);
  const t=(f-i*seg)/seg,a=list[i],b=list[i+1];
  return{r:a.r+(b.r-a.r)*t,g:a.g+(b.g-a.g)*t,b:a.b+(b.b-a.b)*t};
}

function update(){
  const txt = document.getElementById('mainText').value;
  const pfx = document.getElementById('prefix').value;
  const bold = document.getElementById('bold').checked;
  const pv = document.getElementById('preview');
  const out = document.getElementById('output');
  const copyBtn = document.getElementById('copyBtn');
  
  // Custom limit parsing
  let customLimit = parseInt(document.getElementById('limit').value) || 256;
  if(customLimit < 1) customLimit = 1;

  const bt = bold ? '&l' : '';
  const tsz = 8 + bt.length; // Length of &#RRGGBB + optional &l
  
  pv.style.fontWeight = bold ? 'bold' : 'normal';
  
  if(!txt) {
    out.value = '';
    pv.innerHTML = '';
    out.classList.remove('error');
    setCtr(0, customLimit, false);
    return;
  }

  // Optimize colors strict fitting
  const visChars = txt.replace(/ /g, '').length;
  let maxColors = Math.floor((customLimit - pfx.length - txt.length) / tsz);
  let limitExceeded = false;

  // Check if text alone breaks limit
  if (customLimit - pfx.length - txt.length < 0) {
      limitExceeded = true;
      maxColors = 0;
  } else if (maxColors > visChars) {
      maxColors = visChars;
  } else if (maxColors < 0) {
      maxColors = 0;
  }

  // Distribute colors across available slots perfectly
  const placeColor = new Array(visChars).fill(false);
  if (maxColors > 0) {
      if (maxColors >= visChars) {
          placeColor.fill(true);
      } else {
          for (let k = 0; k < maxColors; k++) {
              const idx = Math.floor(k * visChars / maxColors);
              placeColor[idx] = true;
          }
      }
  }

  const rgb = colors.map(h2r);
  let code = pfx;
  let html = '';
  let vi = 0; // visible char index
  let ch = '#ffffff';
  
  for(let i=0; i<txt.length; i++){
    const c = txt[i];
    if(c === ' '){
        code += c; // Minecraft supports persisting color over spaces
        html += `<span style="margin:0 3px"> </span>`;
        continue;
    }
    
    // Inject color tag if slot allows it
    if(placeColor[vi]) {
        const col = lerp(rgb, vi / Math.max(1, visChars - 1));
        ch = r2h(col.r, col.g, col.b);
        code += `&#${ch.slice(1)}${bt}`;
    }
    
    code += c;
    html += `<span style="color:${ch}">${c}</span>`;
    vi++;
  }
  
  pv.innerHTML = html;
  out.value = code;
  const l = txt.length;
  pv.style.fontSize = l > 80 ? '0.78rem' : l > 55 ? '0.95rem' : l > 35 ? '1.15rem' : '1.48rem';
  
  if (code.length > customLimit) {
      limitExceeded = true;
  }
  
  setCtr(code.length, customLimit, limitExceeded);

  // Strict Copy UI Toggle
  if(limitExceeded) {
      out.classList.add('error');
      copyBtn.classList.add('disabled');
      copyBtn.textContent = 'ТЕКСТ СЛИШКОМ ДЛИННЫЙ';
  } else {
      out.classList.remove('error');
      copyBtn.classList.remove('disabled');
      copyBtn.textContent = 'Копировать код';
  }
}

function setCtr(n, limit, over){
  const c = document.getElementById('ctr'), p = document.getElementById('pill');
  c.innerHTML = `${n}<span>/${limit}</span>`;
  c.className = 'ctr' + (over ? ' over' : n >= limit - 10 ? ' maxed' : '');
  p.textContent = over ? 'ЛИМИТ ПРЕВЫШЕН' : n >= limit - 10 ? 'МАКСИМУМ' : 'ГОТОВО';
  p.className = 'pill' + (over ? ' warn' : '');
}

function doCopy(e){
  const out = document.getElementById('output');
  if (out.classList.contains('error')) return; // Strict block copy on error
  
  out.select();
  try { document.execCommand('copy') } catch{}
  
  const b = e.currentTarget, t = b.textContent;
  b.textContent = '✓ Скопировано!';
  b.style.background = 'var(--ok)';
  b.style.color = '#001a10';
  
  setTimeout(() => {
    if(!out.classList.contains('error')){
        b.textContent = 'Копировать код';
    }
    b.style.background = '';
    b.style.color = '';
  }, 1300);
}

buildPresets();
buildTextPresets();
renderStops();
update();
</script>
</body>
